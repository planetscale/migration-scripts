# pgcopydb filter configuration
# See: https://github.com/planetscale/pgcopydb/blob/main/docs/ref/pgcopydb_filter.rst
#
# IMPORTANT: No comments allowed inside sections — pgcopydb parses # lines as names.
# Place all comments before the first section.
#
# Available sections:
#   [exclude-schema]        - Exclude entire schemas
#   [exclude-table]         - Exclude specific tables (schema.table format)
#   [exclude-extension]     - Exclude extensions and their owned objects
#   [exclude-event-trigger] - Exclude specific event triggers
#   [include-only-table]    - Include ONLY these tables (exclusive with exclude)
#   [include-only-schema]   - Include ONLY these schemas (exclusive with exclude)
#
# Common exclusions for RDS sources:
#   [exclude-extension]
#   rds_tools
#   pg_repack
#
# Common exclusions for Supabase sources:
#   [exclude-schema]
#   auth
#   supabase_functions
#   storage
#   cron
#   realtime
#   supabase_migrations
#   net
#   _supabase
#   graphql
#   graphql_public
#
#   [exclude-extension]
#   pg_net
#   pg_repack
#   http
#   pg_graphql
#   pg_stat_monitor
#   pgstattuple
