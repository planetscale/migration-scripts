AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with pgcopydb for PostgreSQL-to-PlanetScale migrations (Ubuntu 24.04 LTS). Requires dual connectivity: outbound internet access to PlanetScale and private network access to source databases. (Generated by Liftoff Migration Reviewer)'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Resource Naming"
        Parameters:
          - ResourcePrefix
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcId
          - SubnetId
      - Label:
          default: "Instance Configuration"
        Parameters:
          - InstanceType
          - VolumeSize
      - Label:
          default: "SSH Access (Optional - EC2 Instance Connect enabled by default)"
        Parameters:
          - KeyPairName
          - YourPublicIP
    ParameterLabels:
      ResourcePrefix:
        default: "Resource Name Prefix"
      VpcId:
        default: "VPC ID"
      SubnetId:
        default: "Public Subnet ID"
      InstanceType:
        default: "EC2 Instance Type"
      VolumeSize:
        default: "EBS Volume Size (GB)"
      KeyPairName:
        default: "EC2 Key Pair (Optional)"
      YourPublicIP:
        default: "Your Public IP Address (Optional)"
  Generated:
    Tool: 'PlanetScale Liftoff Migration Reviewer'
    Date: '2026-04-23T18:47:25.397Z'
    Purpose: 'pgcopydb EC2 instance for PostgreSQL to PlanetScale migrations'

Parameters:
  ResourcePrefix:
    Type: String
    Default: 'planetscale-migration'
    Description: 'Prefix for all resource names'
    AllowedPattern: '[a-z0-9-]+'
    ConstraintDescription: 'Must be lowercase alphanumeric with hyphens only'

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the instance will be launched

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet ID with internet gateway route (required for PlanetScale connectivity)

  InstanceType:
    Type: String
    Default: c7i.xlarge
    AllowedValues:
      - c7i.xlarge
      - c7i.2xlarge
      - c7i.4xlarge
      - c7i.8xlarge
      - c7i.12xlarge
      - c7i.16xlarge
    Description: Instance type (c7i.xlarge for <100GB, c7i.2xlarge for 100-500GB, c7i.4xlarge for >500GB)

  VolumeSize:
    Type: String
    Default: '1000'
    AllowedValues:
      - '500'
      - '1000'
      - '3000'
      - '6000'
      - '12000'
    Description: 'EBS volume size in GB (io2 Block Express: 500GB=30K, 1TB=40K, 3TB=50K, 6TB=60K, 12TB=70K IOPS)'

  KeyPairName:
    Type: String
    Default: ''
    Description: Optional - EC2 Key Pair for key-based SSH access. Leave empty to use EC2 Instance Connect only.

  YourPublicIP:
    Type: String
    Default: ''
    Description: Your public IP address to restrict SSH access (recommended). Leave empty to allow SSH from anywhere. Get your IP from icanhazip.com.
    AllowedPattern: '^$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5]).){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
    ConstraintDescription: Must be empty or a valid IPv4 address (e.g., 203.0.113.123)

Mappings:
  VolumeConfig:
    '500':
      Iops: 30000
    '1000':
      Iops: 40000
    '3000':
      Iops: 50000
    '6000':
      Iops: 60000
    '12000':
      Iops: 70000

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]
  HasPublicIP: !Not [!Equals [!Ref YourPublicIP, '']]

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-ec2-role'
        - Key: Purpose
          Value: PostgreSQL to PlanetScale Migration

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for pgcopydb migration instance
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-sg'
        - Key: Purpose
          Value: PostgreSQL to PlanetScale Migration

  EC2InstanceConnectIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !If [HasPublicIP, !Sub '${YourPublicIP}/32', '0.0.0.0/0']
      Description: !If [HasPublicIP, !Sub 'SSH access restricted to ${YourPublicIP}', 'SSH access open to all (specify YourPublicIP to restrict)']

  ICMPDestinationUnreachableIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: icmp
      FromPort: 3
      ToPort: -1
      CidrIp: 0.0.0.0/0
      Description: ICMP Destination Unreachable for path MTU discovery

  Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - setup_cfn
            - install_packages
            - configure_system
            - verify_installation
        setup_cfn:
          files:
            /etc/cfn/cfn-hup.conf:
              content: !Sub |
                [main]
                stack=${AWS::StackId}
                region=${AWS::Region}
              mode: '000400'
              owner: root
              group: root
            /etc/cfn/hooks.d/cfn-auto-reloader.conf:
              content: !Sub |
                [cfn-auto-reloader-hook]
                triggers=post.update
                path=Resources.Instance.Metadata.AWS::CloudFormation::Init
                action=/opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
              mode: '000400'
              owner: root
              group: root
        install_packages:
          commands:
            01_update_apt:
              command: |
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -y
            02_install_prerequisites:
              command: |
                export DEBIAN_FRONTEND=noninteractive
                apt-get install -y wget gnupg2 lsb-release curl unzip ca-certificates netcat-openbsd sqlite3
            03_add_postgresql_repo:
              command: |
                # Add PostgreSQL APT repository (using modern method for Ubuntu 24.04)
                wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
                echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list
                apt-get update
            04_install_postgresql:
              command: |
                export DEBIAN_FRONTEND=noninteractive
                # Install PostgreSQL 17 client and build dependencies
                apt-get install -y postgresql-client-17 postgresql-17 postgresql-server-dev-17
            05_install_build_tools:
              command: |
                export DEBIAN_FRONTEND=noninteractive
                # Install build tools and libraries needed for pgcopydb
                apt-get install -y \
                  build-essential \
                  git \
                  libssl-dev \
                  libpq-dev \
                  libgc-dev \
                  liblz4-dev \
                  libpam0g-dev \
                  libxml2-dev \
                  libxslt1-dev \
                  libreadline-dev \
                  zlib1g-dev \
                  libncurses5-dev \
                  libkrb5-dev \
                  libselinux1-dev \
                  libzstd-dev
            06_build_pgcopydb:
              command: |
                cd /tmp
                git clone --branch v0.18.0 https://github.com/planetscale/pgcopydb.git
                cd pgcopydb
                export PATH=/usr/lib/postgresql/17/bin:$PATH
                make clean || true
                make
                make install
                ldconfig
              test: test ! -f /usr/local/bin/pgcopydb
            07_install_aws_cli:
              command: |
                cd /tmp
                curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
                unzip -q awscliv2.zip
                ./aws/install
                rm -rf aws awscliv2.zip
              test: test ! -f /usr/local/bin/aws
            08_install_cloudwatch:
              command: |
                cd /tmp
                wget -q https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
                dpkg -i amazon-cloudwatch-agent.deb
                rm -f amazon-cloudwatch-agent.deb
        configure_system:
          files:
            /etc/security/limits.d/99-pgcopydb.conf:
              content: |
                *  soft  nofile  65536
                *  hard  nofile  65536
              mode: '000644'
              owner: root
              group: root
            /etc/sysctl.d/99-pgcopydb.conf:
              content: |
                net.ipv4.tcp_keepalive_time = 60
                net.ipv4.tcp_keepalive_intvl = 10
                net.ipv4.tcp_keepalive_probes = 6
                net.core.rmem_max = 134217728
                net.core.wmem_max = 134217728
                net.ipv4.tcp_rmem = 4096 87380 67108864
                net.ipv4.tcp_wmem = 4096 65536 67108864
              mode: '000644'
              owner: root
              group: root
            /etc/profile.d/pgcopydb.sh:
              content: |
                export PATH=/usr/lib/postgresql/17/bin:$PATH
                alias pgcopydb-version='pgcopydb --version'
                alias psql-version='psql --version'
                alias check-planetscale='nc -zv app.connect.psdb.cloud 443 2>&1 | grep succeeded'
              mode: '000644'
              owner: root
              group: root
            /home/ubuntu/.env:
              content: |
                # PlanetScale Migration Environment Variables
                # Edit these values before running the migration

                # Source Database
                PGCOPYDB_SOURCE_PGURI="postgresql://user:password@source-host:5432/dbname?sslmode=require"

                # Target Database (PlanetScale)
                PGCOPYDB_TARGET_PGURI="postgresql://user:password@target-host.connect.psdb.cloud:5432/dbname?sslmode=require"
              mode: '000600'
              owner: ubuntu
              group: ubuntu
          commands:
            02_clone_migration_scripts:
              command: |
                git clone --depth 1 https://github.com/planetscale/migration-scripts.git /tmp/migration-scripts
                cp -r /tmp/migration-scripts/pgcopydb-helpers/* /home/ubuntu/
                rm -rf /tmp/migration-scripts
                chown ubuntu:ubuntu /home/ubuntu/*.sh /home/ubuntu/*.md
                chmod +x /home/ubuntu/*.sh
            01_apply_sysctl:
              command: sysctl -p /etc/sysctl.d/99-pgcopydb.conf
        verify_installation:
          commands:
            01_log_versions:
              command: |
                echo "=== Installation verification ===" >> /var/log/cfn-init-verification.log
                export PATH=/usr/lib/postgresql/17/bin:$PATH
                pgcopydb --version >> /var/log/cfn-init-verification.log 2>&1 || echo "pgcopydb installation failed" >> /var/log/cfn-init-verification.log
                psql --version >> /var/log/cfn-init-verification.log 2>&1 || echo "PostgreSQL client installation failed" >> /var/log/cfn-init-verification.log
                aws --version >> /var/log/cfn-init-verification.log 2>&1 || echo "AWS CLI installation failed" >> /var/log/cfn-init-verification.log
                echo "=== Installation complete at $(date) ===" >> /var/log/cfn-init-verification.log
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id}}'
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: io2
            Iops: !FindInMap [VolumeConfig, !Ref VolumeSize, Iops]
            DeleteOnTermination: true
            Encrypted: true
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1

          # Update package lists
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y

          # Install CloudFormation helper scripts
          apt-get install -y python3-pip python3-setuptools
          mkdir -p /opt/aws/bin
          python3 -m pip install --break-system-packages https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz

          # Create symlinks for cfn tools
          ln -sf /usr/local/bin/cfn-init /opt/aws/bin/cfn-init
          ln -sf /usr/local/bin/cfn-signal /opt/aws/bin/cfn-signal
          ln -sf /usr/local/bin/cfn-hup /opt/aws/bin/cfn-hup

          # Run cfn-init to execute the metadata configuration
          /usr/local/bin/cfn-init -v --stack ${AWS::StackName} --resource Instance --region ${AWS::Region} --configsets default

          # Signal CloudFormation that the instance is ready
          /usr/local/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-ec2'
        - Key: Purpose
          Value: PostgreSQL to PlanetScale Migration

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  PublicIP:
    Description: Public IP address (for PlanetScale connectivity)
    Value: !GetAtt Instance.PublicIp

  PrivateIP:
    Description: Private IP address (for VPC database connectivity)
    Value: !GetAtt Instance.PrivateIp

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref SecurityGroup

  SSHCommand:
    Condition: HasKeyPair
    Description: SSH connection command (only shown when Key Pair is provided)
    Value: !Sub 'ssh -i /path/to/${KeyPairName}.pem ubuntu@${Instance.PublicIp}'

  EC2InstanceConnectCommand:
    Description: EC2 Instance Connect command (no key required)
    Value: !Sub 'aws ec2-instance-connect send-ssh-public-key --instance-id ${Instance} --instance-os-user ubuntu --ssh-public-key file://~/.ssh/id_rsa.pub --availability-zone ${Instance.AvailabilityZone}'

  SessionManagerCommand:
    Description: AWS Session Manager connection command
    Value: !Sub 'aws ssm start-session --target ${Instance}'

  PgcopydbVersion:
    Description: Command to check pgcopydb version
    Value: 'ssh to instance and run: pgcopydb --version'

  UsageGuide:
    Description: Quick start guide
    Value: '1. Connect via EC2 Instance Connect or SSH 2. Verify: pgcopydb --version 3. See ~/README.md for usage instructions'

  MigrationScriptsPath:
    Description: Path to migration helper scripts
    Value: '/home/ubuntu/'
